<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | CodeBreakers</title>
  <!-- Redirect to unified login page -->
  <meta http-equiv="refresh" content="0; url=../login.html"/>
  <link rel="stylesheet" href="../../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
    .login-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:44px 40px;width:100%;max-width:440px;position:relative;z-index:1;}
    .login-logo{text-align:center;margin-bottom:32px;}
    .login-logo .logo-icon{width:56px;height:56px;border-radius:14px;margin:0 auto 12px;font-size:1.5rem;}
    .login-logo h2{font-size:1.6rem;color:var(--text);}
    .login-logo p{font-size:0.85rem;color:var(--text-muted);margin-top:4px;}
    .admin-badge{display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(255,107,53,0.1);border:1px solid rgba(255,107,53,0.3);color:var(--accent);padding:8px 16px;border-radius:50px;font-size:0.78rem;font-family:var(--font-heading);letter-spacing:2px;margin-bottom:28px;}
    .show-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.9rem;}
    .input-wrap{position:relative;}
    .divider{text-align:center;color:var(--text-dim);font-size:0.8rem;margin:20px 0;position:relative;}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border);}
    .divider::before{left:0;}.divider::after{right:0;}
  </style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="login-card">
  <div class="login-logo">
    <div class="logo-icon" style="background:linear-gradient(135deg,var(--accent),var(--secondary));display:flex;align-items:center;justify-content:center;color:#fff;"><i class="fas fa-shield-alt"></i></div>
    <h2>Code<span style="color:var(--primary);">Breakers</span></h2>
    <p>Admin Control Panel</p>
  </div>
  <div class="admin-badge"><i class="fas fa-lock"></i> SECURE ADMIN ACCESS</div>
  <div id="loginAlert"></div>
  <form id="adminLoginForm">
    <div class="form-group">
      <label>Admin Username</label>
      <input type="text" class="form-control" id="adminUser" placeholder="Enter admin username" required/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" class="form-control" id="adminPass" placeholder="Enter password" required style="padding-right:44px;"/>
        <button type="button" class="show-pw" onclick="togglePw('adminPass',this)"><i class="fas fa-eye"></i></button>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.88rem;color:var(--text-muted);">
        <input type="checkbox" style="accent-color:var(--primary);"/> Remember me
      </label>
      <a href="#" style="color:var(--primary);font-size:0.88rem;">Forgot password?</a>
    </div>
    <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-sign-in-alt"></i> Sign In as Admin</button>
  </form>
  <div class="divider">or</div>
  <a href="../../index.html" class="btn btn-ghost btn-block"><i class="fas fa-home"></i> Back to Home</a>
</div>
<script>
  // Redirect to unified login page
  window.location.replace('../login.html');
</script>
</body>
</html>
