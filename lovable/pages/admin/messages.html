<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messages | Admin | CodeBreakers</title>
  <link rel="stylesheet" href="../../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .chat-layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 56px);overflow:hidden;}
    .contacts-panel{border-right:1px solid var(--border);overflow-y:auto;}
    .contact-item{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.03);transition:var(--transition);}
    .contact-item:hover,.contact-item.active{background:rgba(0,245,255,0.06);}
    .contact-item.active{border-left:2px solid var(--primary);}
    .contact-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;flex-shrink:0;position:relative;}
    .online-dot{position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;background:var(--success);border:2px solid var(--bg-card);}
    .contact-info{flex:1;min-width:0;}
    .contact-info h4{color:var(--text);font-size:0.85rem;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .contact-info p{font-size:0.75rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .unread-badge{background:var(--danger);color:#fff;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;}
    .chat-panel{display:flex;flex-direction:column;}
    .chat-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:var(--bg-card);flex-shrink:0;}
    .chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;}
    .msg{display:flex;gap:10px;max-width:75%;}
    .msg.sent{align-self:flex-end;flex-direction:row-reverse;}
    .msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;flex-shrink:0;margin-top:4px;}
    .msg-bubble{padding:10px 14px;border-radius:14px;font-size:0.87rem;line-height:1.6;}
    .msg.received .msg-bubble{background:var(--bg-card2);border:1px solid var(--border);color:var(--text);border-radius:4px 14px 14px 14px;}
    .msg.sent .msg-bubble{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#000;border-radius:14px 4px 14px 14px;}
    .msg-time{font-size:0.68rem;color:var(--text-dim);margin-top:3px;}
    .msg.sent .msg-time{text-align:right;}
    .chat-input-bar{padding:12px 20px;border-top:1px solid var(--border);background:var(--bg-card);display:flex;gap:10px;align-items:center;}
    .chat-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-family:var(--font-main);font-size:0.88rem;outline:none;}
    .chat-input:focus{border-color:var(--primary);}
    .announcement-form{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:20px;}
  </style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="nav-logo"><div class="logo-icon"><i class="fas fa-code"></i></div><span class="logo-text">Code<span class="accent">Breakers</span></span></div></div>
    <nav class="sidebar-nav"><ul>
      <li><a href="dashboard.html" class="sidebar-link"><i class="fas fa-th-large"></i> Dashboard</a></li>
      <li><a href="students.html" class="sidebar-link"><i class="fas fa-users"></i> Students</a></li>
      <li><a href="courses.html" class="sidebar-link"><i class="fas fa-book"></i> Courses</a></li>
      <li><a href="lessons.html" class="sidebar-link"><i class="fas fa-video"></i> Lessons</a></li>
      <li><a href="exams.html" class="sidebar-link"><i class="fas fa-file-alt"></i> Exams</a></li>
      <li><a href="assignments.html" class="sidebar-link"><i class="fas fa-tasks"></i> Assignments</a></li>
      <li><a href="grades.html" class="sidebar-link"><i class="fas fa-star"></i> Grades</a></li>
      <li><a href="leaderboard.html" class="sidebar-link"><i class="fas fa-trophy"></i> Leaderboard</a></li>
      <li><a href="attendance.html" class="sidebar-link"><i class="fas fa-calendar-check"></i> Attendance</a></li>
      <li><a href="messages.html" class="sidebar-link active"><i class="fas fa-comments"></i> Messages <span class="badge badge-danger" style="margin-left:auto;">3</span></a></li>
      <li><a href="../login.html" class="sidebar-link"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul></nav>
  </aside>
  <div class="main-content" style="overflow:hidden;">
    <div class="topbar">
      <div class="topbar-left">
        <button id="sidebarToggle" style="background:none;border:none;color:var(--text-muted);font-size:1.2rem;cursor:pointer;"><i class="fas fa-bars"></i></button>
        <span class="topbar-title">Messages & Announcements</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" onclick="openModal('announceModal')"><i class="fas fa-bullhorn"></i> Broadcast</button>
      </div>
    </div>
    <div class="chat-layout">
      <!-- Contacts -->
      <div class="contacts-panel">
        <div style="padding:10px;border-bottom:1px solid var(--border);">
          <input type="text" placeholder="🔍 Search students..." style="width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-family:var(--font-main);font-size:0.82rem;outline:none;"/>
        </div>
        <div id="contactsList"></div>
      </div>
      <!-- Chat -->
      <div class="chat-panel">
        <div class="chat-header">
          <div class="contact-avatar" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:#000;">A</div>
          <div><h4 style="color:var(--text);font-size:0.9rem;" id="chatName">Aisha Mohammed</h4><p style="font-size:0.75rem;color:var(--success);"><i class="fas fa-circle" style="font-size:0.45rem;"></i> Online — CB-2026-10001</p></div>
          <div style="margin-left:auto;display:flex;gap:8px;">
            <button style="background:none;border:1px solid var(--border);color:var(--text-muted);padding:6px 12px;border-radius:var(--radius);cursor:pointer;font-size:0.8rem;" onclick="showToast('Opening student profile','info')"><i class="fas fa-user"></i></button>
          </div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-bar">
          <button style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;"><i class="fas fa-paperclip"></i></button>
          <input type="text" class="chat-input" id="msgInput" placeholder="Type a message to student..." onkeydown="if(event.key==='Enter')sendMsg()"/>
          <button class="btn btn-primary btn-sm" onclick="sendMsg()" style="border-radius:50%;width:38px;height:38px;padding:0;"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Broadcast Modal -->
<div class="modal-overlay" id="announceModal">
  <div class="modal">
    <div class="modal-header"><h3><i class="fas fa-bullhorn" style="color:var(--warning);margin-right:8px;"></i>Send Announcement</h3><button class="modal-close"><i class="fas fa-times"></i></button></div>
    <div class="form-group"><label>Recipients</label>
      <select class="form-control"><option>All Students (500)</option><option>Frontend Students (180)</option><option>Backend Students (160)</option><option>Cybersecurity Students (160)</option></select>
    </div>
    <div class="form-group"><label>Subject</label><input type="text" class="form-control" placeholder="e.g. New Lesson Available: JavaScript Functions"/></div>
    <div class="form-group"><label>Message</label><textarea class="form-control" rows="4" placeholder="Write your announcement..."></textarea></div>
    <div class="form-group"><label>Notification Type</label>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.88rem;"><input type="checkbox" checked style="accent-color:var(--primary);"/> In-App</label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.88rem;"><input type="checkbox" style="accent-color:var(--primary);"/> Email</label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.88rem;"><input type="checkbox" style="accent-color:var(--primary);"/> SMS</label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('announceModal')">Cancel</button>
      <button class="btn btn-primary" onclick="sendAnnouncement()"><i class="fas fa-paper-plane"></i> Send Announcement</button>
    </div>
  </div>
</div>

<script src="../../js/particles.js"></script>
<script src="../../js/app.js"></script>
<script>
const contacts = [
  { id:1, name:'Aisha Mohammed', reg:'CB-2026-10001', avatar:'A', color:'linear-gradient(135deg,var(--primary),var(--secondary))', online:true, unread:2, last:'Can you explain async/await?', time:'2m' },
  { id:2, name:'Ibrahim Khalil', reg:'CB-2026-10002', avatar:'I', color:'linear-gradient(135deg,#7b2ff7,#5a1fb8)', online:true, unread:1, last:'When is the next exam?', time:'15m' },
  { id:3, name:'Fatima Zahra', reg:'CB-2026-10003', avatar:'F', color:'linear-gradient(135deg,var(--success),#00cc6a)', online:false, unread:0, last:'Thank you for the feedback!', time:'2h' },
  { id:4, name:'Yusuf Adamu', reg:'CB-2026-10004', avatar:'Y', color:'linear-gradient(135deg,var(--accent),var(--secondary))', online:false, unread:0, last:'I submitted the assignment.', time:'1d' },
];
const convos = {
  1:[{s:'them',t:"Hello instructor! I'm struggling with the async/await concept in JavaScript. Can you help?",time:'9:00'},{s:'me',t:"Hi Aisha! Sure, async/await is just syntactic sugar over Promises. Let me explain with an example.",time:'9:05'},{s:'me',t:"Think of async functions as functions that always return a Promise. The 'await' keyword pauses execution until the Promise resolves.",time:'9:06'},{s:'them',t:"That makes more sense now! So I can use try/catch with await?",time:'9:10'},{s:'me',t:"Exactly! Use try/catch to handle errors. Practice it in the sandbox with the fetch API examples.",time:'9:12'},{s:'them',t:"Can you explain async/await more? Specifically with fetch?",time:'2m ago'}],
  2:[{s:'them',t:"Hi! When is the JavaScript Fundamentals exam?",time:'1h ago'},{s:'me',t:"The exam is available now until April 15th. Make sure you've completed all lessons first!",time:'45m ago'},{s:'them',t:"When is the next exam after that?",time:'15m ago'}],
  3:[{s:'them',t:"Thank you for the detailed feedback on my CSS project!",time:'3h ago'},{s:'me',t:"Great work Fatima! Your animations were creative. Just polish the mobile responsiveness.",time:'2h ago'},{s:'them',t:"Thank you for the feedback!",time:'2h ago'}],
  4:[{s:'them',t:"I submitted the JS Calculator assignment.",time:'1d ago'},{s:'me',t:"Received! I'll review it and get back to you.",time:'1d ago'},{s:'them',t:"I submitted the assignment.",time:'1d ago'}],
};
let active = 1;
function renderContacts() {
  document.getElementById('contactsList').innerHTML = contacts.map(c=>`
    <div class="contact-item ${c.id===active?'active':''}" onclick="selectContact(${c.id})">
      <div class="contact-avatar" style="background:${c.color};color:#000;">${c.avatar}${c.online?'<div class="online-dot"></div>':''}</div>
      <div class="contact-info"><h4>${c.name}</h4><p>${c.last}</p></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;">
        <span style="font-size:0.7rem;color:var(--text-dim);">${c.time}</span>
        ${c.unread?`<div class="unread-badge">${c.unread}</div>`:''}
      </div>
    </div>`).join('');
}
function selectContact(id){active=id;contacts.find(c=>c.id===id).unread=0;const c=contacts.find(x=>x.id===id);document.getElementById('chatName').textContent=c.name;renderContacts();renderMessages();}
function renderMessages(){
  const msgs=convos[active]||[];
  document.getElementById('chatMessages').innerHTML=msgs.map(m=>`
    <div class="msg ${m.s==='me'?'sent':'received'}">
      ${m.s==='them'?`<div class="msg-avatar" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:#000;">${contacts.find(c=>c.id===active)?.avatar||'S'}</div>`:''}
      <div><div class="msg-bubble">${m.t}</div><div class="msg-time">${m.time}</div></div>
      ${m.s==='me'?`<div class="msg-avatar" style="background:linear-gradient(135deg,var(--accent),var(--secondary));color:#fff;">A</div>`:''}
    </div>`).join('');
  const chat=document.getElementById('chatMessages');chat.scrollTop=chat.scrollHeight;
}
function sendMsg(){
  const input=document.getElementById('msgInput');const txt=input.value.trim();if(!txt)return;
  if(!convos[active])convos[active]=[];
  convos[active].push({s:'me',t:txt,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
  input.value='';renderMessages();showToast('Message sent','success');
}
function sendAnnouncement(){showToast('Announcement sent to all students!','success');closeModal('announceModal');}
renderContacts();renderMessages();
</script>
</body>
</html>
