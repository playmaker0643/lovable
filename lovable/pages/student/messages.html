<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messages | CodeBreakers</title>
  <link rel="stylesheet" href="../../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .chat-layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 56px);overflow:hidden;}
    .contacts-panel{border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
    .contacts-search{padding:12px;border-bottom:1px solid var(--border);}
    .contact-item{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:var(--transition);border-bottom:1px solid rgba(255,255,255,0.03);}
    .contact-item:hover,.contact-item.active{background:rgba(0,245,255,0.06);}
    .contact-item.active{border-left:2px solid var(--primary);}
    .contact-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;flex-shrink:0;position:relative;}
    .online-dot{position:absolute;bottom:2px;right:2px;width:10px;height:10px;border-radius:50%;background:var(--success);border:2px solid var(--bg-card);}
    .contact-info{flex:1;min-width:0;}
    .contact-info h4{color:var(--text);font-size:0.88rem;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .contact-info p{font-size:0.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .contact-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
    .unread-badge{background:var(--primary);color:#000;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:700;}
    .chat-panel{display:flex;flex-direction:column;height:100%;}
    .chat-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:var(--bg-card);flex-shrink:0;}
    .chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;}
    .msg{display:flex;gap:10px;max-width:75%;}
    .msg.sent{align-self:flex-end;flex-direction:row-reverse;}
    .msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;flex-shrink:0;margin-top:4px;}
    .msg-bubble{padding:12px 16px;border-radius:16px;font-size:0.88rem;line-height:1.6;max-width:100%;}
    .msg.received .msg-bubble{background:var(--bg-card2);border:1px solid var(--border);color:var(--text);border-radius:4px 16px 16px 16px;}
    .msg.sent .msg-bubble{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#000;border-radius:16px 4px 16px 16px;}
    .msg-time{font-size:0.7rem;color:var(--text-dim);margin-top:4px;text-align:right;}
    .msg.received .msg-time{text-align:left;}
    .chat-input-bar{padding:14px 20px;border-top:1px solid var(--border);background:var(--bg-card);display:flex;gap:10px;align-items:flex-end;flex-shrink:0;}
    .chat-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;color:var(--text);font-family:var(--font-main);font-size:0.9rem;outline:none;resize:none;max-height:120px;min-height:42px;}
    .chat-input:focus{border-color:var(--primary);}
    .chat-actions{display:flex;gap:8px;align-items:center;}
    .icon-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:none;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);}
    .icon-btn:hover{color:var(--primary);border-color:var(--border-glow);}
    .typing-indicator{display:flex;align-items:center;gap:6px;padding:6px 12px;font-size:0.78rem;color:var(--text-muted);}
    .typing-dots{display:flex;gap:3px;}
    .typing-dots span{width:5px;height:5px;border-radius:50%;background:var(--primary);animation:typingBounce 1s infinite;}
    .typing-dots span:nth-child(2){animation-delay:0.2s;}
    .typing-dots span:nth-child(3){animation-delay:0.4s;}
    @keyframes typingBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @media(max-width:768px){.chat-layout{grid-template-columns:1fr;}.contacts-panel{display:none;}}
  </style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="nav-logo"><div class="logo-icon"><i class="fas fa-code"></i></div><span class="logo-text">Code<span class="accent">Breakers</span></span></div></div>
    <nav class="sidebar-nav"><ul>
      <li><a href="dashboard.html" class="sidebar-link"><i class="fas fa-th-large"></i> Dashboard</a></li>
      <li><a href="lessons.html" class="sidebar-link"><i class="fas fa-video"></i> My Lessons</a></li>
      <li><a href="exams.html" class="sidebar-link"><i class="fas fa-file-alt"></i> Exams</a></li>
      <li><a href="grades.html" class="sidebar-link"><i class="fas fa-star"></i> My Grades</a></li>
      <li><a href="sandbox.html" class="sidebar-link"><i class="fas fa-terminal"></i> Code Sandbox</a></li>
      <li><a href="security.html" class="sidebar-link"><i class="fas fa-shield-alt"></i> Security Training</a></li>
      <li><a href="messages.html" class="sidebar-link active"><i class="fas fa-comments"></i> Messages</a></li>
      <li><a href="leaderboard.html" class="sidebar-link"><i class="fas fa-trophy"></i> Leaderboard</a></li>
      <li><a href="#" class="sidebar-link" onclick="event.preventDefault();Auth.logoutStudent()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul></nav>
  </aside>
  <div class="main-content" style="overflow:hidden;">
    <div class="topbar" style="display:none;"></div>
    <div style="height:100%;display:flex;flex-direction:column;">
      <div style="padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg-card);display:flex;align-items:center;gap:12px;">
        <i class="fas fa-comments" style="color:var(--primary);"></i>
        <span style="font-family:var(--font-heading);font-size:0.95rem;color:var(--text);">Messages & Chat</span>
        <span class="badge badge-danger" style="margin-left:8px;">2 new</span>
      </div>
      <div class="chat-layout">
        <!-- Contacts -->
        <div class="contacts-panel">
          <div class="contacts-search">
            <input type="text" placeholder="🔍  Search contacts..." style="width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-family:var(--font-main);font-size:0.85rem;outline:none;"/>
          </div>
          <div id="contactsList"></div>
        </div>

        <!-- Chat Window -->
        <div class="chat-panel">
          <div class="chat-header" id="chatHeader">
            <div class="contact-avatar" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:#000;">A</div>
            <div>
              <h4 style="color:var(--text);font-size:0.9rem;">Abdussalam Nasir</h4>
              <p style="font-size:0.78rem;color:var(--success);"><i class="fas fa-circle" style="font-size:0.5rem;"></i> Online — Instructor</p>
            </div>
            <div style="margin-left:auto;display:flex;gap:8px;">
              <button class="icon-btn"><i class="fas fa-phone"></i></button>
              <button class="icon-btn"><i class="fas fa-video"></i></button>
              <button class="icon-btn"><i class="fas fa-ellipsis-v"></i></button>
            </div>
          </div>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="typing-indicator" id="typingIndicator" style="display:none;">
            <div class="typing-dots"><span></span><span></span><span></span></div>
            <span>Abdussalam is typing...</span>
          </div>
          <div class="chat-input-bar">
            <div class="chat-actions">
              <button class="icon-btn" title="Attach file"><i class="fas fa-paperclip"></i></button>
              <button class="icon-btn" title="Emoji"><i class="fas fa-smile"></i></button>
            </div>
            <textarea class="chat-input" id="msgInput" placeholder="Type a message..." rows="1" onkeydown="handleMsgKey(event)"></textarea>
            <button class="btn btn-primary btn-sm" onclick="sendMessage()" style="flex-shrink:0;border-radius:50%;width:40px;height:40px;padding:0;"><i class="fas fa-paper-plane"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../../js/particles.js"></script>
<script src="../../js/app.js"></script>
<script>
const contacts = [
  { id:1, name:'Abdussalam Nasir', role:'Instructor', avatar:'A', color:'linear-gradient(135deg,var(--primary),var(--secondary))', colorText:'#000', online:true, unread:2, lastMsg:'Check the assignment I uploaded...', time:'2m' },
  { id:2, name:'Abdulhafiz Nasir', role:'Security Instructor', avatar:'A', color:'linear-gradient(135deg,var(--accent),var(--secondary))', colorText:'#fff', online:true, unread:0, lastMsg:'Great work on the pen test module!', time:'1h' },
  { id:3, name:'Support Team', role:'Admin Support', avatar:'S', color:'linear-gradient(135deg,#7b2ff7,#5a1fb8)', colorText:'#fff', online:false, unread:0, lastMsg:'Your query has been resolved.', time:'1d' },
  { id:4, name:'Aisha Mohammed', role:'Classmate', avatar:'A', color:'linear-gradient(135deg,var(--success),#00cc6a)', colorText:'#000', online:false, unread:0, lastMsg:'Did you finish the JS assignment?', time:'2d' },
];

const conversations = {
  1: [
    { sender:'them', text:'Hi! Welcome to CodeBreakers. How are you finding the lessons so far?', time:'9:00 AM' },
    { sender:'me', text:'It\'s amazing! The sequential structure really helps. I just completed the CSS Flexbox lesson.', time:'9:05 AM' },
    { sender:'them', text:'Great progress! Make sure you complete the practice exercises in the sandbox too.', time:'9:07 AM' },
    { sender:'me', text:'Already on it! The live sandbox is super helpful. I built a responsive navbar.', time:'9:10 AM' },
    { sender:'them', text:'Excellent! 🎉 Check the assignment I uploaded for the next lesson. It\'s a full landing page project.', time:'9:12 AM' },
  ],
  2: [
    { sender:'them', text:'Hello! I\'ve uploaded the cybersecurity intro module. Check it when you can.', time:'Yesterday' },
    { sender:'me', text:'Thanks! I found the OWASP Top 10 section really eye-opening.', time:'Yesterday' },
    { sender:'them', text:'Great work on the pen test module! You\'re understanding the concepts well.', time:'Yesterday' },
  ],
  3: [
    { sender:'them', text:'Hello! We\'ve received your query about assignment submission.', time:'2 days ago' },
    { sender:'them', text:'Your query has been resolved. Please try submitting again through the assignments page.', time:'2 days ago' },
  ],
  4: [
    { sender:'them', text:'Hey! Did you finish the JS assignment?', time:'3 days ago' },
    { sender:'me', text:'Not yet! Working on the async/await part. You?', time:'3 days ago' },
    { sender:'them', text:'Same! Let\'s study together on the platform chat.', time:'3 days ago' },
  ]
};

let activeContact = 1;

function renderContacts() {
  document.getElementById('contactsList').innerHTML = contacts.map(c => `
    <div class="contact-item ${c.id === activeContact ? 'active' : ''}" onclick="selectContact(${c.id})">
      <div class="contact-avatar" style="background:${c.color};color:${c.colorText};">
        ${c.avatar}
        ${c.online ? '<div class="online-dot"></div>' : ''}
      </div>
      <div class="contact-info">
        <h4>${c.name}</h4>
        <p>${c.lastMsg}</p>
      </div>
      <div class="contact-meta">
        <span style="font-size:0.72rem;color:var(--text-dim);">${c.time}</span>
        ${c.unread ? `<div class="unread-badge">${c.unread}</div>` : ''}
      </div>
    </div>`).join('');
}

function selectContact(id) {
  activeContact = id;
  const c = contacts.find(x => x.id === id);
  c.unread = 0;
  renderContacts();
  renderMessages();
}

function renderMessages() {
  const msgs = conversations[activeContact] || [];
  const student = Auth.getStudent() || { name: 'Aisha Mohammed' };
  const initials = student.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('chatMessages').innerHTML = msgs.map(m => `
    <div class="msg ${m.sender === 'me' ? 'sent' : 'received'}">
      ${m.sender === 'them' ? `<div class="msg-avatar" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:#000;">A</div>` : ''}
      <div>
        <div class="msg-bubble">${m.text}</div>
        <div class="msg-time">${m.time}</div>
      </div>
      ${m.sender === 'me' ? `<div class="msg-avatar" style="background:linear-gradient(135deg,#7b2ff7,#5a1fb8);color:#fff;">${initials}</div>` : ''}
    </div>`).join('');
  const chat = document.getElementById('chatMessages');
  chat.scrollTop = chat.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  if (!conversations[activeContact]) conversations[activeContact] = [];
  conversations[activeContact].push({ sender:'me', text, time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) });
  input.value = '';
  renderMessages();
  // Simulate reply
  setTimeout(() => {
    document.getElementById('typingIndicator').style.display = 'flex';
    setTimeout(() => {
      document.getElementById('typingIndicator').style.display = 'none';
      const replies = ['Great question! Let me check that for you.','Keep up the great work! 🔥','I\'ll review your submission shortly.','That\'s correct! You\'re making excellent progress.','Check the lesson resources for more details.'];
      conversations[activeContact].push({ sender:'them', text: replies[Math.floor(Math.random()*replies.length)], time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) });
      renderMessages();
    }, 2000);
  }, 500);
}

function handleMsgKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

renderContacts();
renderMessages();
</script>

<!-- Socket.io real-time upgrade (replaces simulated chat) -->
<script>
(function() {
  // Load Socket.io client
  const s = document.createElement('script');
  s.src = 'https://cdn.socket.io/4.7.5/socket.io.min.js';
  s.onload = function() {
    const token = localStorage.getItem('cb_token');
    if (!token) return;

    const socket = io(window.location.origin, {
      auth: { token },
      reconnection: true,
      transports: ['websocket','polling']
    });

    socket.on('connect', () => {
      console.log('🔌 Messages socket connected');
      // Show connected indicator
      const dot = document.querySelector('.online-dot');
      if (dot) dot.style.background = 'var(--success)';
    });

    // Receive incoming messages in real-time
    socket.on('message:receive', (msg) => {
      const senderId = msg.sender?._id || msg.sender;
      if (!conversations[activeContact]) conversations[activeContact] = [];
      // Push as universal format
      conversations[senderId] = conversations[senderId] || [];
      conversations[senderId].push({
        sender: 'them',
        text:   msg.content,
        time:   new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
      });
      // Update contact last message
      const c = contacts.find(x => String(x.id) === String(senderId));
      if (c) { c.lastMsg = msg.content.substring(0,40); c.time = 'Just now'; c.unread++; }
      renderContacts();
      if (String(senderId) === String(activeContact)) renderMessages();
      document.getElementById('typingIndicator').style.display = 'none';
    });

    // Typing indicators
    socket.on('typing:start', ({senderId}) => {
      if (String(senderId) === String(activeContact))
        document.getElementById('typingIndicator').style.display = 'flex';
    });
    socket.on('typing:stop', ({senderId}) => {
      if (String(senderId) === String(activeContact))
        document.getElementById('typingIndicator').style.display = 'none';
    });

    // Online status
    socket.on('user:online', ({userId, online}) => {
      const c = contacts.find(x => String(x.id) === String(userId));
      if (c) { c.online = online; renderContacts(); }
    });

    // Real-time notifications
    socket.on('notification:new', (notif) => {
      if (typeof showToast === 'function')
        showToast(`🔔 ${notif.title}`, 'info', 4000);
    });

    // Override sendMessage to use socket
    window._socketRef = socket;
  };
  document.head.appendChild(s);
})();

// Override sendMessage to use real socket when available
const _origSend = window.sendMessage;
window.sendMessage = function() {
  const input   = document.getElementById('msgInput');
  const text    = input.value.trim();
  if (!text) return;

  // Optimistic UI
  if (!conversations[activeContact]) conversations[activeContact] = [];
  conversations[activeContact].push({
    sender: 'me', text,
    time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
  });
  input.value = '';
  renderMessages();

  // Send via socket if available, else REST API
  if (window._socketRef && window._socketRef.connected) {
    window._socketRef.emit('message:send', { recipientId: activeContact, content: text });
    // Typing stop
    window._socketRef.emit('typing:stop', { recipientId: activeContact });
  } else {
    // REST fallback
    fetch('/api/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + (localStorage.getItem('cb_token') || '')
      },
      body: JSON.stringify({ recipientId: activeContact, content: text })
    }).catch(() => {});
  }
};

// Typing indicator via socket
document.getElementById('msgInput').addEventListener('input', function() {
  if (window._socketRef && window._socketRef.connected && activeContact) {
    window._socketRef.emit('typing:start', { recipientId: activeContact });
    clearTimeout(window._typingTimer);
    window._typingTimer = setTimeout(() => {
      window._socketRef.emit('typing:stop', { recipientId: activeContact });
    }, 2000);
  }
});
</script>
</body>
</html>
