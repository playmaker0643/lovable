<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Code Sandbox | CodeBreakers</title>
  <link rel="stylesheet" href="../../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body{overflow:hidden;}
    .sandbox-layout{display:grid;grid-template-rows:56px 1fr;height:100vh;position:relative;z-index:1;}
    .sandbox-topbar{background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;}
    .sandbox-body{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 56px);}
    .editor-panel{display:flex;flex-direction:column;border-right:1px solid var(--border);}
    .editor-tabs{display:flex;background:rgba(0,0,0,0.3);border-bottom:1px solid var(--border);flex-shrink:0;}
    .editor-tab{padding:10px 18px;font-size:0.8rem;font-family:var(--font-heading);letter-spacing:1px;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:var(--transition);display:flex;align-items:center;gap:7px;user-select:none;}
    .editor-tab.active{color:var(--primary);border-bottom-color:var(--primary);background:rgba(0,245,255,0.05);}
    .editor-tab:hover{color:var(--text);}
    .code-area{flex:1;background:#0d1117;font-family:var(--font-mono);font-size:0.88rem;color:#cdd6f4;padding:20px;border:none;outline:none;resize:none;line-height:1.7;overflow-y:auto;}
    .code-area::placeholder{color:var(--text-dim);}
    .preview-panel{display:flex;flex-direction:column;}
    .preview-header{background:rgba(0,0,0,0.3);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
    .preview-header span{font-size:0.8rem;font-family:var(--font-heading);color:var(--text-muted);letter-spacing:1px;}
    #previewFrame{flex:1;border:none;background:#fff;}
    .output-console{height:140px;background:#0a0f14;border-top:1px solid var(--border);padding:12px 16px;font-family:var(--font-mono);font-size:0.82rem;overflow-y:auto;flex-shrink:0;}
    .console-line{display:flex;gap:10px;margin-bottom:4px;}
    .console-prefix{color:var(--primary);flex-shrink:0;}
    .console-log{color:#cdd6f4;}
    .console-error{color:var(--danger);}
    .console-success{color:var(--success);}
    .lang-selector{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius);padding:5px 12px;color:var(--text);font-family:var(--font-heading);font-size:0.8rem;cursor:pointer;outline:none;}
    .projects-panel{width:220px;background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
    .project-item{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:var(--transition);font-size:0.82rem;color:var(--text-muted);}
    .project-item:hover,.project-item.active{background:rgba(0,245,255,0.06);color:var(--primary);}
    .project-item i{margin-right:8px;width:14px;}
    .line-numbers{background:#0a0f14;padding:20px 8px;font-family:var(--font-mono);font-size:0.88rem;color:var(--text-dim);line-height:1.7;text-align:right;user-select:none;min-width:36px;border-right:1px solid var(--border);overflow:hidden;}
    .editor-body{display:flex;flex:1;overflow:hidden;}
    @media(max-width:900px){.sandbox-body{grid-template-columns:1fr;}.preview-panel{display:none;}}
  </style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="sandbox-layout">
  <!-- Topbar -->
  <div class="sandbox-topbar">
    <a href="dashboard.html" style="color:var(--text-muted);font-size:1rem;"><i class="fas fa-arrow-left"></i></a>
    <div class="nav-logo" style="margin:0;"><div class="logo-icon" style="width:28px;height:28px;font-size:0.85rem;"><i class="fas fa-code"></i></div><span class="logo-text" style="font-size:0.95rem;">Code<span class="accent">Breakers</span> <span style="font-size:0.7rem;color:var(--text-muted);">Sandbox</span></span></div>
    <select class="lang-selector" id="langSelector" onchange="changeLang(this.value)">
      <option value="html">HTML / CSS / JS</option>
      <option value="python">Python (Simulated)</option>
      <option value="node">Node.js (Simulated)</option>
    </select>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
      <button class="btn btn-ghost btn-sm" onclick="saveProject()"><i class="fas fa-save"></i> Save</button>
      <button class="btn btn-ghost btn-sm" onclick="clearEditor()"><i class="fas fa-trash"></i> Clear</button>
      <button class="btn btn-primary btn-sm" onclick="runCode()"><i class="fas fa-play"></i> Run</button>
    </div>
  </div>

  <!-- Body -->
  <div class="sandbox-body">
    <!-- Editor Panel -->
    <div class="editor-panel">
      <div class="editor-tabs" id="editorTabs">
        <div class="editor-tab active" data-tab="html" onclick="switchTab('html')"><i class="fab fa-html5" style="color:#e34c26;"></i>HTML</div>
        <div class="editor-tab" data-tab="css" onclick="switchTab('css')"><i class="fab fa-css3-alt" style="color:#264de4;"></i>CSS</div>
        <div class="editor-tab" data-tab="js" onclick="switchTab('js')"><i class="fab fa-js-square" style="color:#f0db4f;"></i>JavaScript</div>
      </div>
      <div class="editor-body">
        <div class="line-numbers" id="lineNumbers">1</div>
        <textarea class="code-area" id="codeArea" spellcheck="false" onscroll="syncScroll()" onkeyup="updateLineNumbers();updatePreview();" onkeydown="handleTab(event)"></textarea>
      </div>
    </div>

    <!-- Preview Panel -->
    <div class="preview-panel">
      <div class="preview-header">
        <span class="pulse-dot" style="background:var(--success);width:8px;height:8px;border-radius:50%;"></span>
        <span>LIVE PREVIEW</span>
        <button class="btn btn-ghost btn-sm" style="margin-left:auto;" onclick="openFullscreen()"><i class="fas fa-expand"></i></button>
        <button class="btn btn-ghost btn-sm" onclick="refreshPreview()"><i class="fas fa-redo"></i></button>
      </div>
      <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin"></iframe>
      <div class="output-console" id="outputConsole">
        <div class="console-line"><span class="console-prefix">›</span><span class="console-success">CodeBreakers Sandbox v2.0 ready</span></div>
        <div class="console-line"><span class="console-prefix">›</span><span class="console-log">Run your code to see output here...</span></div>
      </div>
    </div>
  </div>
</div>

<!-- Projects Modal -->
<div class="modal-overlay" id="projectsModal">
  <div class="modal">
    <div class="modal-header"><h3><i class="fas fa-folder" style="color:var(--warning);margin-right:8px;"></i>My Projects</h3><button class="modal-close"><i class="fas fa-times"></i></button></div>
    <div id="projectsList"></div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal('projectsModal')">Close</button><button class="btn btn-primary" onclick="newProject()"><i class="fas fa-plus"></i> New Project</button></div>
  </div>
</div>

<script src="../../js/particles.js"></script>
<script src="../../js/app.js"></script>
<script>
const defaultCode = {
  html: `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Project</title>
  <style>
    /* Add your CSS here or in the CSS tab */
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    h1 { color: #00f5ff; }
    .btn {
      background: linear-gradient(135deg, #00f5ff, #7b2ff7);
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Hello, CodeBreakers!</h1>
    <p>Edit this code and click Run to see changes.</p>
    <button class="btn" onclick="greet()">Click Me!</button>
  </div>
  <script>
    function greet() {
      alert('Welcome to the CodeBreakers Sandbox!');
    }
  <\/script>
</body>
</html>`,
  css: `/* Global Styles */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: #0d1117;
  color: #e2e8f0;
  line-height: 1.6;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 40px 20px;
}

h1 {
  color: #00f5ff;
  margin-bottom: 20px;
  font-size: 2rem;
}

.card {
  background: #111827;
  border: 1px solid rgba(0,245,255,0.2);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
}

.btn {
  background: linear-gradient(135deg, #00f5ff, #7b2ff7);
  border: none;
  padding: 10px 24px;
  border-radius: 8px;
  color: #000;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.2s;
}

.btn:hover {
  transform: translateY(-2px);
}`,
  js: `// JavaScript Practice
// Write your JavaScript here

// Example: Counter
let count = 0;

function increment() {
  count++;
  document.getElementById('counter').textContent = count;
  console.log('Count:', count);
}

function reset() {
  count = 0;
  document.getElementById('counter').textContent = count;
}

// Example: Fetch API
async function fetchData() {
  try {
    const response = await fetch('https://jsonplaceholder.typicode.com/todos/1');
    const data = await response.json();
    console.log('Fetched data:', JSON.stringify(data));
  } catch (err) {
    console.error('Error:', err.message);
  }
}

// Run on load
console.log('CodeBreakers Sandbox loaded!');
console.log('Start coding below...');`,
  python: `# Python Practice (Simulated Output)
# Note: Python runs in a simulated environment

def greet(name):
    return f"Hello, {name}! Welcome to CodeBreakers."

def fibonacci(n):
    """Generate fibonacci sequence up to n terms"""
    a, b = 0, 1
    result = []
    for _ in range(n):
        result.append(a)
        a, b = b, a + b
    return result

def is_palindrome(s):
    """Check if a string is a palindrome"""
    s = s.lower().replace(' ', '')
    return s == s[::-1]

# Main execution
name = "Student"
print(greet(name))
print(f"Fibonacci(10): {fibonacci(10)}")
print(f"Is 'racecar' a palindrome? {is_palindrome('racecar')}")
print(f"Is 'hello' a palindrome? {is_palindrome('hello')}")

# List comprehension
squares = [x**2 for x in range(1, 11)]
print(f"Squares 1-10: {squares}")`,
  node: `// Node.js Practice (Simulated Output)
// Note: Runs in a simulated environment

const http = require('http');
const express = require('express'); // Simulated

// Express-style server setup
const app = {
  routes: {},
  get(path, handler) { this.routes[path] = handler; },
  listen(port, cb) { cb && cb(); return this; }
};

// Define routes
app.get('/', (req, res) => {
  console.log('GET / - Home route accessed');
  return { status: 200, body: 'Welcome to CodeBreakers API!' };
});

app.get('/api/students', (req, res) => {
  const students = [
    { id: 'CB-2026-10001', name: 'Aisha Mohammed', course: 'Frontend' },
    { id: 'CB-2026-10002', name: 'Ibrahim Khalil', course: 'Backend' },
  ];
  console.log('GET /api/students - Returning', students.length, 'students');
  return { status: 200, data: students };
});

// Middleware simulation
function authMiddleware(req) {
  const token = req.headers?.authorization;
  if (!token) return { error: '401 Unauthorized' };
  return { user: { id: 1, role: 'student' } };
}

// Utility functions
function generateRegNo() {
  const year = new Date().getFullYear();
  const rand = Math.floor(10000 + Math.random() * 90000);
  return \`CB-\${year}-\${rand}\`;
}

// Run simulation
console.log('=== CodeBreakers Node.js Sandbox ===');
app.listen(3000, () => console.log('Server running on port 3000'));
const route = app.routes['/'];
const result = route && route({}, {});
console.log('Response:', JSON.stringify(result));
console.log('New Registration No:', generateRegNo());
console.log('Auth check (no token):', JSON.stringify(authMiddleware({})));`
};

let currentTab = 'html';
let currentLang = 'html';
const tabs = { html: defaultCode.html, css: defaultCode.css, js: defaultCode.js };

function switchTab(tab) {
  tabs[currentTab] = document.getElementById('codeArea').value;
  currentTab = tab;
  document.getElementById('codeArea').value = tabs[tab];
  document.querySelectorAll('.editor-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  updateLineNumbers();
}

function changeLang(lang) {
  currentLang = lang;
  const tabsEl = document.getElementById('editorTabs');
  if (lang === 'html') {
    tabsEl.innerHTML = `
      <div class="editor-tab active" data-tab="html" onclick="switchTab('html')"><i class="fab fa-html5" style="color:#e34c26;"></i>HTML</div>
      <div class="editor-tab" data-tab="css" onclick="switchTab('css')"><i class="fab fa-css3-alt" style="color:#264de4;"></i>CSS</div>
      <div class="editor-tab" data-tab="js" onclick="switchTab('js')"><i class="fab fa-js-square" style="color:#f0db4f;"></i>JavaScript</div>`;
    currentTab = 'html';
    document.getElementById('codeArea').value = defaultCode.html;
  } else if (lang === 'python') {
    tabsEl.innerHTML = `<div class="editor-tab active" data-tab="python"><i class="fab fa-python" style="color:#3572A5;"></i>Python</div>`;
    currentTab = 'python';
    document.getElementById('codeArea').value = defaultCode.python;
  } else if (lang === 'node') {
    tabsEl.innerHTML = `<div class="editor-tab active" data-tab="node"><i class="fab fa-node-js" style="color:#68a063;"></i>Node.js</div>`;
    currentTab = 'node';
    document.getElementById('codeArea').value = defaultCode.node;
  }
  updateLineNumbers();
}

function runCode() {
  const console_ = document.getElementById('outputConsole');
  const logLine = (msg, type='log') => {
    console_.innerHTML += `<div class="console-line"><span class="console-prefix">›</span><span class="console-${type}">${msg}</span></div>`;
    console_.scrollTop = console_.scrollHeight;
  };

  console_.innerHTML = '';
  logLine('Running code...', 'success');

  if (currentLang === 'html') {
    tabs[currentTab] = document.getElementById('codeArea').value;
    const fullCode = `${tabs.html}<style>${tabs.css}</style><script>${tabs.js}<\/script>`;
    const frame = document.getElementById('previewFrame');
    frame.srcdoc = fullCode;
    logLine('✓ HTML/CSS/JS rendered in preview', 'success');
    logLine('✓ Check preview panel on the right', 'log');
  } else if (currentLang === 'python') {
    const code = document.getElementById('codeArea').value;
    simulatePython(code, logLine);
  } else if (currentLang === 'node') {
    const code = document.getElementById('codeArea').value;
    simulateNode(code, logLine);
  }
}

function simulatePython(code, log) {
  const prints = code.match(/print\(([^)]+)\)/g) || [];
  log('=== Python Output ===', 'success');
  if (prints.length === 0) { log('No print statements found', 'log'); return; }
  prints.forEach(p => {
    const content = p.replace(/^print\(/, '').replace(/\)$/, '').replace(/f?["']|["']$/g, '');
    log(content.replace(/\{[^}]+\}/g, '<value>'), 'log');
  });
}

function simulateNode(code, log) {
  const logs = code.match(/console\.log\(([^)]+)\)/g) || [];
  log('=== Node.js Output ===', 'success');
  if (logs.length === 0) { log('No console.log statements found', 'log'); return; }
  logs.forEach(l => {
    const content = l.replace(/^console\.log\(/, '').replace(/\)$/, '').replace(/['"`]/g, '');
    log(content, 'log');
  });
}

function updatePreview() {
  if (currentLang === 'html') {
    tabs[currentTab] = document.getElementById('codeArea').value;
  }
}

function updateLineNumbers() {
  const lines = document.getElementById('codeArea').value.split('\n').length;
  document.getElementById('lineNumbers').innerHTML = Array.from({length: lines}, (_, i) => i + 1).join('<br>');
}

function syncScroll() {
  document.getElementById('lineNumbers').scrollTop = document.getElementById('codeArea').scrollTop;
}

function handleTab(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const ta = document.getElementById('codeArea');
    const start = ta.selectionStart, end = ta.selectionEnd;
    ta.value = ta.value.substring(0, start) + '  ' + ta.value.substring(end);
    ta.selectionStart = ta.selectionEnd = start + 2;
  }
}

function clearEditor() {
  if (confirm('Clear the editor?')) {
    document.getElementById('codeArea').value = '';
    updateLineNumbers();
    document.getElementById('previewFrame').srcdoc = '';
    document.getElementById('outputConsole').innerHTML = '<div class="console-line"><span class="console-prefix">›</span><span class="console-log">Editor cleared.</span></div>';
  }
}

function saveProject() {
  const name = prompt('Save project as:', 'My Project');
  if (name) {
    const projects = JSON.parse(localStorage.getItem('cb_projects') || '[]');
    projects.push({ name, lang: currentLang, code: document.getElementById('codeArea').value, date: new Date().toLocaleDateString() });
    localStorage.setItem('cb_projects', JSON.stringify(projects));
    showToast(`Project "${name}" saved!`, 'success');
  }
}

function refreshPreview() { runCode(); }
function openFullscreen() {
  const frame = document.getElementById('previewFrame');
  if (frame.requestFullscreen) frame.requestFullscreen();
}

function newProject() {
  changeLang('html');
  closeModal('projectsModal');
  showToast('New project created!', 'success');
}

// Init
document.getElementById('codeArea').value = defaultCode.html;
updateLineNumbers();
// Auto-run on load
setTimeout(runCode, 500);
</script>
</body>
</html>
